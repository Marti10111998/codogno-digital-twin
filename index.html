<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Codogno Digital Twin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.116/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.116/Build/Cesium/Widgets/widgets.css" rel="stylesheet" />
  <style>
    html, body, #cesiumContainer {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <div id="cesiumContainer"></div>

  <!-- UI Panel -->
  <div class="absolute top-4 left-4 bg-white/90 p-4 rounded-xl shadow-lg w-72 space-y-4 z-10 font-sans">
    <div>
      <label class="block font-medium">Select Building</label>
      <select id="buildingSelector" class="w-full border rounded px-2 py-1">
        <option value="">-- All Buildings --</option>
      </select>
    </div>
    <div>
      <label class="block font-medium">Color</label>
      <input type="color" id="colorPicker" class="w-full" value="#cccccc" />
    </div>
    <div>
      <label class="block font-medium">Transparency</label>
      <input type="range" id="alphaRange" min="0" max="1" step="0.1" value="0.7" class="w-full" />
    </div>
    <div>
      <label class="block font-medium">Time of Day</label>
      <input type="range" id="timeSlider" min="0" max="24" step="1" value="12" class="w-full" />
      <div id="timeLabel" class="text-sm text-gray-600">12:00</div>
    </div>
    <div>
      <label class="inline-flex items-center">
        <input type="checkbox" id="heatToggle" checked class="mr-2" />
        Show Heat Colors (4 p.m.)
      </label>
    </div>
    <div>
      <label class="inline-flex items-center">
        <input type="checkbox" id="shadowToggle" checked class="mr-2" />
        Enable Shadows
      </label>
    </div>
  </div>

  <script>
    async function startCesiumApp() {
      Cesium.Ion.defaultAccessToken = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiIxMTUyZDQ1NS1mMzZhLTQzYTEtOWE5NC1iZjM4OWJlMWVhZTMiLCJpZCI6MzA0ODA3LCJpYXQiOjE3NDc4MjQzNjV9.GicPO1Vdm6jWAy1XAnct4jCx4muG1tuFcF-Dlvlg1Rw";

      const viewer = new Cesium.Viewer("cesiumContainer", {
        baseLayerPicker: true,
        timeline: false,
        animation: false,
        shadows: true
      });

      const terrain = await Cesium.createWorldTerrainAsync();
      viewer.terrainProvider = terrain;

      viewer.scene.globe.enableLighting = true;
      viewer.scene.shadowMap.enabled = true;
      viewer.scene.shadowMap.softShadows = true;
      viewer.scene.shadowMap.size = 2048;
      viewer.scene.shadowMap.normalOffset = true;
      viewer.scene.shadowMap.darkness = 0.3;
      viewer.scene.globe.depthTestAgainstTerrain = true;

      viewer.scene.light = new Cesium.SunLight();
      viewer.clock.currentTime = Cesium.JulianDate.fromDate(new Date(2025, 5, 21, 12));

      let buildings = [];
      const buildingSelector = document.getElementById("buildingSelector");

      const dataSource = await Cesium.GeoJsonDataSource.load("codogno_buildings_with_uhi.geojson", {
        clampToGround: false
      });
      viewer.dataSources.add(dataSource);
      buildings = dataSource.entities.values;

      buildings.forEach((building, i) => {
        const name = `Building ${i + 1}`;
        building.name = name;

        const height = parseFloat(building.properties?.height?.getValue()) || 10;

        if (building.polygon) {
          building.polygon.extrudedHeight = height;
          building.polygon.height = 0;
          building.polygon.heightReference = Cesium.HeightReference.RELATIVE_TO_GROUND;
          building.polygon.extrudedHeightReference = Cesium.HeightReference.RELATIVE_TO_GROUND;
          building.polygon.material = Cesium.Color.LIGHTGRAY.withAlpha(1);
          building.polygon.outline = false;
        }

        const option = document.createElement("option");
        option.value = name;
        option.textContent = name;
        buildingSelector.appendChild(option);
      });

      viewer.camera.flyTo({
        destination: Cesium.Cartesian3.fromDegrees(9.703, 45.165, 500),
        orientation: {
          heading: Cesium.Math.toRadians(0),
          pitch: Cesium.Math.toRadians(-45),
          roll: 0.0
        }
      });

      function updateStyles() {
        const selected = buildingSelector.value;
        const colorHex = document.getElementById("colorPicker").value;
        const alpha = parseFloat(document.getElementById("alphaRange").value);
        const color = Cesium.Color.fromCssColorString(colorHex).withAlpha(alpha);
        const showHeat = document.getElementById("heatToggle").checked;

        for (const building of buildings) {
          if (!building.polygon) continue;

          if (showHeat) {
            const t = parseFloat(building.properties?.t1600_max?.getValue());
            if (!isNaN(t)) {
              const normalized = Math.min(Math.max((t - 25) / 10, 0), 1); // clamp 0–1
              const hue = 0.7 - normalized * 0.7; // from blue to red
              const heatColor = Cesium.Color.fromHsl(hue, 1.0, 0.5, alpha);
              building.polygon.material = heatColor;
            }
          } else if (!selected || building.name === selected) {
            building.polygon.material = color;
          }
        }
      }

      document.getElementById("colorPicker").addEventListener("input", updateStyles);
      document.getElementById("alphaRange").addEventListener("input", updateStyles);
      document.getElementById("buildingSelector").addEventListener("change", updateStyles);
      document.getElementById("heatToggle").addEventListener("change", updateStyles);

      document.getElementById("shadowToggle").addEventListener("change", (e) => {
        const enabled = e.target.checked;
        viewer.shadows = enabled;
        viewer.scene.shadowMap.enabled = enabled;
      });

      const timeSlider = document.getElementById("timeSlider");
      const timeLabel = document.getElementById("timeLabel");

      timeSlider.addEventListener("input", () => {
        const hour = parseInt(timeSlider.value);
        timeLabel.textContent = `${hour}:00`;

        const newDate = new Date(2025, 5, 21, hour);
        viewer.clock.currentTime = Cesium.JulianDate.fromDate(newDate);
      });
    }

    startCesiumApp();
  </script>
</body>
</html>
