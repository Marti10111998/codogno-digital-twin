<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Codogno Digital Twin — Realtime + Predictive</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/cesium@1.116/Build/Cesium/Cesium.js"></script>
  <link href="https://unpkg.com/cesium@1.116/Build/Cesium/Widgets/widgets.css" rel="stylesheet" />
  <style>
    html, body, #cesiumContainer { margin:0; padding:0; width:100%; height:100%; overflow:hidden; }
    #legend {
      position:absolute; bottom:1rem; left:1rem; background:white; padding:.5rem; border-radius:.5rem;
      font-family:sans-serif; font-size:12px; z-index:10; width:210px; box-shadow:0 2px 4px rgba(0,0,0,.2);
    }
    #legendGradient { height:16px; background:linear-gradient(to right,#313695,#4575b4,#74add1,#fee090,#d73027); margin-top:.25rem; border-radius:4px; }
    #tooltip {
      position:absolute; background:white; border:1px solid #ccc; padding:6px 8px; font-size:13px; pointer-events:none;
      border-radius:6px; box-shadow:0 2px 8px rgba(0,0,0,.15); z-index:1000; max-width:260px; display:none;
    }
  </style>
</head>

<body class="bg-gray-50">
  <div id="cesiumContainer"></div>

  <!-- Control Panel -->
  <div class="absolute top-4 left-4 bg-white/90 p-4 rounded-xl shadow-lg w-96 space-y-4 z-10 font-sans">
    <div class="flex items-center justify-between">
      <div class="text-lg font-semibold">Codogno Digital Twin</div>
      <span id="modelBadge" class="text-[11px] text-gray-600">Forecast: Holt-Winters (Worker)</span>
    </div>

    <div class="grid grid-cols-2 gap-3">
      <div class="col-span-2">
        <label class="block font-medium">Select Building</label>
        <select id="buildingSelector" class="w-full border rounded px-2 py-1">
          <option value="">— All Buildings —</option>
        </select>
      </div>

      <div>
        <label class="block font-medium">Base Color</label>
        <input type="color" id="colorPicker" class="w-full" value="#cccccc" />
      </div>

      <div class="col-span-2">
        <label class="block font-medium">Time of Day</label>
        <input type="range" id="timeSlider" min="0" max="24" step="1" value="12" class="w-full" />
        <div class="text-sm text-gray-600 flex items-center justify-between">
          <span id="timeLabel">12:00</span>
          <div class="space-x-2">
            <button data-mins="0"  class="snapBtn text-xs px-2 py-1 rounded bg-gray-100">Now</button>
            <button data-mins="10" class="snapBtn text-xs px-2 py-1 rounded bg-gray-100">+10m</button>
            <button data-mins="30" class="snapBtn text-xs px-2 py-1 rounded bg-gray-100">+30m</button>
            <button data-mins="60" class="snapBtn text-xs px-2 py-1 rounded bg-gray-100">+60m</button>
          </div>
        </div>
      </div>

      <div>
        <label class="inline-flex items-center"><input type="checkbox" id="heatToggle" checked class="mr-2" /> Show Heat Colors</label>
      </div>
      <div>
        <label class="inline-flex items-center"><input type="checkbox" id="shadowToggle" checked class="mr-2" /> Enable Shadows</label>
      </div>

      <div class="col-span-2">
        <label class="inline-flex items-center"><input type="checkbox" id="predictionToggle" checked class="mr-2" /> Predicted Heat (next hour)</label>
      </div>

      <div class="col-span-2">
        <label class="block font-medium">Traffic Heatmap Time</label>
        <select id="heatmapTimeSelector" class="w-full border rounded px-2 py-1">
          <option value="morning">Morning</option>
          <option value="lunch">Lunch</option>
          <option value="evening">Evening</option>
          <option value="night">Night</option>
        </select>
      </div>

      <div class="col-span-2">
        <label class="inline-flex items-center"><input type="checkbox" id="liveTrafficToggle" class="mr-2" checked /> Live Traffic (TomTom)</label>
        <select id="trafficRefresh" class="w-full border rounded px-2 py-1 mt-2">
          <option value="15" selected>Refresh: 15s</option>
          <option value="30">Refresh: 30s</option>
          <option value="60">Refresh: 60s</option>
        </select>
      </div>
    </div>
  </div>

  <div id="legend">
    <div class="font-semibold">UHI Temperature (°C)</div>
    <div id="legendGradient"></div>
    <div class="flex justify-between"><span id="legendMin">25</span><span id="legendMax">40</span></div>
    <div id="legendMode" class="text-[11px] text-gray-600 mt-1">Mode: Predicted</div>
  </div>

  <div id="tooltip"></div>

  <!-- Air & Comfort Panel -->
  <div id="pollutionPanel" class="absolute bottom-4 right-4 bg-white/90 p-4 rounded-xl shadow-lg w-[22rem] space-y-2 z-10 font-sans text-sm">
    <div class="font-semibold text-gray-700">Predicted Pollution (now)</div>
    <div id="pollutionOutput">Loading...</div>
    <div id="pollutionStamp" class="text-[11px] text-gray-600">—</div>
  </div>

  <script type="module">
    /* ======================
       KEEPING YOUR API KEYS
       ====================== */
    const OPENWEATHER_KEY = "2d6c23f739fdc7ba90b8754fd02dae9c";
    const TOMTOM_KEY      = "j1Z1JoCDAq3ia7s4XaLTTd8Ip6G3nzZ5";
    Cesium.Ion.defaultAccessToken = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiIxMTUyZDQ1NS1mMzZhLTQzYTEtOWE5NC1iZjM4OWJlMWVhZTMiLCJpZCI6MzA0ODA3LCJpYXQiOjE3NDc4MjQzNjV9.GicPO1Vdm6jWAy1XAnct4jCx4muG1tuFcF-Dlvlg1Rw";

    /* If you host your model later, set this to its URL.
       On Netlify, we avoid calling localhost to prevent errors. */
    const IS_LOCAL = ["localhost","127.0.0.1"].includes(location.hostname);
    const POLLUTION_API = IS_LOCAL ? "http://localhost:8000" : null;

    // ===============  STATE  ===============
    let viewer, buildings = [], heatmapEntities = [];
    let trafficLayer = null, trafficTimer = null;
    const histories = { urbanTemp: [], O3: [], NO2: [], NO: [], CO: [], NH3: [] };
    let lastWeather = { temp: 28, wind: 1.5, clouds: 20, humidity: 50, pressure: 1013, rain1h: 0 };
    const HORIZON_STEPS = 6;   // 6 x 10 min
    const STEP_MINUTES  = 10;

    // Legend autoscale
    let UHI_MIN = 25, UHI_MAX = 40, UHI_AUTOSCALE = true;

    // ============  HELPERS  ============
    const clamp01 = x => Math.max(0, Math.min(1, x));
    async function resilientFetch(url, tries=3, base=500){
      for (let i=0;i<tries;i++){
        try { const r = await fetch(url, { cache:"no-store" }); if (r.ok) return r; } catch(_) {}
        await new Promise(res=>setTimeout(res, base*2**i + Math.random()*200));
      }
      throw new Error("fetch failed: " + url);
    }

    // Color ramp (blue→red)
    const UHI_STOPS = [
      { p: 0.00, c: Cesium.Color.fromBytes(49, 54,149,255) },
      { p: 0.25, c: Cesium.Color.fromBytes(69,117,180,255) },
      { p: 0.50, c: Cesium.Color.fromBytes(116,173,209,255) },
      { p: 0.75, c: Cesium.Color.fromBytes(254,224,144,255) },
      { p: 1.00, c: Cesium.Color.fromBytes(215, 48, 39,255) }
    ];
    const lerp=(a,b,t)=>a+(b-a)*t;
    function interpolateColor(stops,t){
      t = clamp01(t);
      for (let i=1;i<stops.length;i++){
        if (t <= stops[i].p){
          const a=stops[i-1], b=stops[i], w=(t-a.p)/(b.p-a.p);
          return new Cesium.Color( lerp(a.c.red,b.c.red,w), lerp(a.c.green,b.c.green,w), lerp(a.c.blue,b.c.blue,w), 1 );
        }
      }
      return stops.at(-1).c.clone();
    }
    function uhiToColor(temp, alpha=1){
      const t = (temp - UHI_MIN) / (UHI_MAX - UHI_MIN);
      const c = interpolateColor(UHI_STOPS, t);
      return new Cesium.Color(c.red, c.green, c.blue, alpha);
    }
    const setLegendText=(min,max)=>{ document.getElementById("legendMin").textContent=Math.round(min); document.getElementById("legendMax").textContent=Math.round(max); };

    function getEntityTemp(ent){
      const usePred = document.getElementById("predictionToggle")?.checked;
      if (usePred && ent.properties?.pred_uhi?.getValue){
        const when = viewer?.clock?.currentTime ?? Cesium.JulianDate.now();
        return ent.properties.pred_uhi.getValue(when);
      }
      const sim = ent.properties?.sim_uhi?.getValue?.() ?? ent.properties?.sim_uhi;
      return (typeof sim === "number") ? sim : undefined;
    }

    function computeUHIBounds(){
      if (!UHI_AUTOSCALE) { setLegendText(UHI_MIN, UHI_MAX); return; }
      let min= 1e9, max=-1e9, n=0;
      for (const b of buildings){
        const v = getEntityTemp(b);
        if (typeof v === "number" && isFinite(v)){ min=Math.min(min,v); max=Math.max(max,v); n++; }
      }
      if (n>0){
        UHI_MIN = Math.floor(min);
        UHI_MAX = Math.ceil(max);
        if (UHI_MAX - UHI_MIN < 5) UHI_MAX = UHI_MIN + 5;
        setLegendText(UHI_MIN, UHI_MAX);
      }
    }

    // ============  FORECAST (Worker)  ============
    const workerCode = `
      self.onmessage = (e) => {
        if (e.data?.kind !== "FORECAST") return;
        const { histories, horizon } = e.data.payload;
        function hw(series, a=0.5,b=0.3,g=0.2, m=24, h=6){
          if (!series || series.length < 3) return Array(h).fill(series?.[series.length-1] ?? 0);
          const L=[series[0]], T=[series[1]-series[0]], S = new Array(m).fill(0);
          for(let t=1;t<series.length;t++){
            const s=S[(t-1)%m];
            const l=a*(series[t]-s)+(1-a)*(L[t-1]+T[t-1]);
            const tt=b*(l-L[t-1])+(1-b)*T[t-1];
            S[t%m]=g*(series[t]-l)+(1-g)*s;
            L[t]=l; T[t]=tt;
          }
          const last=series.length-1;
          return Array.from({length:h},(_,i)=>(L[last]+(i+1)*T[last])+S[(last+1+i)%m]);
        }
        const ensure = (s,seed)=>(!s||!s.length)?[seed,seed*1.02,seed*1.01,seed*1.03]:s;
        const out = {
          urbanTemp: hw(ensure(histories.urbanTemp, 28), 0.5,0.3,0.2, 24, horizon),
          O3:  hw(ensure(histories.O3, 80),  0.5,0.3,0.2, 24, horizon),
          NO2: hw(ensure(histories.NO2, 30), 0.5,0.3,0.2, 24, horizon),
          NO:  hw(ensure(histories.NO, 20),  0.5,0.3,0.2, 24, horizon),
          CO:  hw(ensure(histories.CO, 1.0), 0.5,0.3,0.2, 24, horizon),
          NH3: hw(ensure(histories.NH3, 1.0),0.5,0.3,0.2, 24, horizon)
        };
        postMessage({ kind:"PREDICTIONS", data: out });
      };
    `;
    const worker = new Worker(URL.createObjectURL(new Blob([workerCode], {type:'application/javascript'})));
    let latestPred = null;
    worker.onmessage = (e)=>{ if (e.data?.kind==="PREDICTIONS"){ latestPred = e.data.data; updatePredictedUHIForBuildings(); paintPollutionPanel(); } };

    // ============  DATA & MODELS  ============
    function computeUHI(urbanTemp, height, wind, clouds){
      return urbanTemp + 0.03*height - 0.2*wind - 0.02*clouds;
    }

    async function predictWithAPI(weather){
      if (!POLLUTION_API) return null;            // avoid localhost error on Netlify
      const controller = new AbortController();   // quick timeout so UI stays snappy
      const t = setTimeout(()=>controller.abort(), 1500);

      const features = {
        Temperature: weather.temp,
        Humidity: weather.humidity,
        Precipitation: (weather.rain1h || 0),
        WindSpeed_m_s: weather.wind
      };
      try{
        const r = await fetch(`${POLLUTION_API}/predict`,{
          method:"POST",
          headers:{ "Content-Type":"application/json" },
          body: JSON.stringify(features),
          signal: controller.signal
        });
        clearTimeout(t);
        if (!r.ok) throw new Error("RF API " + r.status);
        return await r.json();
      }catch{ return null; }
    }

    function heuristicPollution(w){
      const { temp, wind, humidity, clouds } = w;
      const clip=(x,a,b)=>Math.max(a,Math.min(b,x));
      return {
        O3:  clip(60 + (temp-20)*2 - clouds*0.3 - 2*wind, 20, 140),
        NO2: clip(20 + 0.2*clouds + (30 - 3*wind), 5, 80),
        NO:  clip(10 + 0.1*(humidity-50) + (30 - 4*wind), 2, 70),
        CO:  clip(0.6 + 0.02*(30 - 5*wind), 0.2, 3),
        NH3: clip(0.8 + 0.01*(humidity-50), 0.3, 4)
      };
    }

    async function tick(){
      // OpenWeather (with graceful fallback)
      try{
        const urbanURL = `https://api.openweathermap.org/data/2.5/weather?lat=45.165&lon=9.703&units=metric&appid=${OPENWEATHER_KEY}`;
        const r = await resilientFetch(urbanURL);
        const j = await r.json();
        lastWeather = {
          temp: j.main?.temp ?? lastWeather.temp,
          wind: j.wind?.speed ?? lastWeather.wind,
          clouds: j.clouds?.all ?? lastWeather.clouds,
          humidity: j.main?.humidity ?? lastWeather.humidity,
          pressure: j.main?.pressure ?? lastWeather.pressure,
          rain1h: (j.rain && (j.rain["1h"] ?? j.rain["h1"])) || 0
        };
      }catch{
        // tiny diurnal drift if OW fails
        const t = new Date(); const hr=t.getHours()+t.getMinutes()/60;
        lastWeather.temp = 26 + 6*Math.sin((hr-6)/24*Math.PI*2);
      }

      histories.urbanTemp.push(lastWeather.temp); if (histories.urbanTemp.length>200) histories.urbanTemp.shift();

      // Pollution via RF API or heuristic
      let poll = await predictWithAPI(lastWeather);
      if (!poll) poll = heuristicPollution(lastWeather);
      for (const k of ["O3","NO2","NO","CO","NH3"]){
        histories[k].push(Number(poll[k])||0); if (histories[k].length>200) histories[k].shift();
      }

      // set measured UHI
      for (const b of buildings){
        const h = parseFloat(b.properties?.height?.getValue?.() ?? b.properties?.height) || 10;
        const sim = computeUHI(lastWeather.temp, h, lastWeather.wind, lastWeather.clouds);
        b.properties.addProperty("sim_uhi", sim);
      }

      // forecast + repaint
      worker.postMessage({ kind:"FORECAST", payload:{ histories, horizon:HORIZON_STEPS, stepMinutes:STEP_MINUTES } });
      updateStyles();
      paintPollutionPanel();
    }

    function updatePredictedUHIForBuildings(){
      if (!latestPred) return;
      const now = Date.now(); const wind=lastWeather.wind, clouds=lastWeather.clouds;
      const arr = latestPred.urbanTemp || [];
      for (const b of buildings){
        const h = parseFloat(b.properties?.height?.getValue?.() ?? b.properties?.height) || 10;
        const p = new Cesium.SampledProperty(Number);
        const len = (arr?.length||0);
        for (let i=0;i<len;i++){
          const jd = Cesium.JulianDate.fromDate(new Date(now + i*STEP_MINUTES*60*1000));
          p.addSample(jd, computeUHI(arr[i], h, wind, clouds));
        }
        b.properties.addProperty("pred_uhi", p);
      }
      viewer.scene.requestRender();
    }

    // ============  STYLING  ============
    function updateStyles(){
      if (!viewer || !buildings.length) return;
      computeUHIBounds();

      const selected = document.getElementById("buildingSelector").value || "";
      const baseHex  = document.getElementById("colorPicker").value || "#cccccc";
      const showHeat = document.getElementById("heatToggle").checked;

      document.getElementById("legendMode").textContent =
        "Mode: " + (document.getElementById("predictionToggle").checked ? "Predicted" : "Measured");

      for (const b of buildings){
        if (!b.polygon) continue;
        let col = Cesium.Color.fromCssColorString(baseHex).withAlpha(1);
        if (showHeat){
          const t = getEntityTemp(b);
          if (typeof t === "number" && isFinite(t)) col = uhiToColor(t, 1);
        }
        if (!selected || b.name === selected) b.polygon.material = col;
      }
      viewer.scene.requestRender();
    }

    // ============  UI PANELS  ============
    function paintPollutionPanel(){
      const out = latestPred
        ? { O3: latestPred.O3?.[0], NO2: latestPred.NO2?.[0], NO: latestPred.NO?.[0], CO: latestPred.CO?.[0], NH3: latestPred.NH3?.[0] }
        : { O3: histories.O3.at(-1), NO2: histories.NO2.at(-1), NO: histories.NO.at(-1), CO: histories.CO.at(-1), NH3: histories.NH3.at(-1) };

      const thresholds = { O3:100, NO2:40, NO:50, CO:10, NH3:2 };
      const level = (p, v)=> v < thresholds[p]*0.6 ? "bg-green-100 text-green-800"
                             : v < thresholds[p]     ? "bg-yellow-100 text-yellow-800"
                                                     : "bg-red-100 text-red-800";
      const make = (k,v)=>`<div class="p-2 rounded-lg ${level(k,v)} flex justify-between items-center"><span class="font-medium">${k}</span><span class="font-semibold">${(v??0).toFixed(2)}</span></div>`;
      document.getElementById("pollutionOutput").innerHTML =
        `<div class="grid grid-cols-2 gap-2">${make("O3",out.O3)}${make("NO2",out.NO2)}${make("NO",out.NO)}${make("CO",out.CO)}${make("NH3",out.NH3)}</div>`;
      document.getElementById("pollutionStamp").textContent = "Updated: " + new Date().toLocaleTimeString();
    }

    // ============  CESIUM INIT  ============
    async function startCesiumApp(){
      // Base imagery: keyless OSM; Terrain: try Ion, fall back to ellipsoid
      const viewerOpts = {
        baseLayerPicker:false, timeline:false, animation:false, shadows:true,
        imageryProvider: new Cesium.OpenStreetMapImageryProvider({ url: 'https://a.tile.openstreetmap.org/' })
      };
      viewer = new Cesium.Viewer("cesiumContainer", viewerOpts);
      viewer.scene.globe.depthTestAgainstTerrain = true;
      viewer.scene.requestRenderMode = true;
      viewer.scene.maximumRenderTimeChange = 1/30;

      try{
        viewer.terrainProvider = await Cesium.createWorldTerrainAsync();
        viewer.scene.globe.enableLighting = true;
      }catch(e){
        console.warn("Ion terrain failed, using ellipsoid:", e?.message||e);
        viewer.terrainProvider = new Cesium.EllipsoidTerrainProvider();
        viewer.scene.globe.enableLighting = false;
      }

      // Buildings
      const buildingSelector = document.getElementById("buildingSelector");
      const ds = await Cesium.GeoJsonDataSource.load("codogno_buildings_with_heights.geojson", { clampToGround:false });
      viewer.dataSources.add(ds);
      buildings = ds.entities.values;

      buildings.forEach((b,i)=>{
        const name = `Building ${i+1}`; b.name = name;
        const h = parseFloat(b.properties?.height?.getValue?.() ?? b.properties?.height) || 10;
        if (b.polygon){
          b.polygon.extrudedHeight = h;
          b.polygon.height = 0;
          b.polygon.heightReference = Cesium.HeightReference.RELATIVE_TO_GROUND;
          b.polygon.extrudedHeightReference = Cesium.HeightReference.RELATIVE_TO_GROUND;
          b.polygon.material = Cesium.Color.LIGHTGRAY.withAlpha(1);
          b.polygon.outline = false;
        }
        const opt=document.createElement("option"); opt.value=name; opt.textContent=name; buildingSelector.appendChild(opt);
      });

      // First data pull + schedule
      await tick();
      setInterval(tick, 60_000);

      // Camera
      viewer.camera.flyTo({
        destination: Cesium.Cartesian3.fromDegrees(9.703, 45.165, 900),
        orientation: { heading: 0, pitch: Cesium.Math.toRadians(-45), roll: 0 }
      });

      // Tooltip
      const tooltip = document.getElementById("tooltip");
      viewer.screenSpaceEventHandler.setInputAction((movement)=>{
        const picked = viewer.scene.pick(movement.endPosition);
        if (picked?.id?.properties){
          const props = picked.id.properties;
          const usePred = document.getElementById("predictionToggle").checked;
          const tempVal = getEntityTemp(picked.id);
          const h = props?.height?.getValue?.() ?? props?.height ?? "N/A";
          const name = picked.id.name ?? "Unknown";
          const label = usePred ? "Pred" : "Temp";
          const tNum = Number(tempVal);
          tooltip.innerHTML = `<strong>${name}</strong><br>Height: ${h} m<br>${label}: ${isFinite(tNum)?tNum.toFixed(1):"N/A"} °C`;
          tooltip.style.left = (movement.endPosition.x + 15) + "px";
          tooltip.style.top  = (movement.endPosition.y + 15) + "px";
          tooltip.style.display = "block";
        } else tooltip.style.display = "none";
      }, Cesium.ScreenSpaceEventType.MOUSE_MOVE);

      // Inputs
      document.getElementById("colorPicker").addEventListener("input", updateStyles);
      document.getElementById("buildingSelector").addEventListener("change", updateStyles);
      document.getElementById("heatToggle").addEventListener("change", updateStyles);
      document.getElementById("predictionToggle").addEventListener("change", updateStyles);
      document.getElementById("shadowToggle").addEventListener("change", (e)=>{
        const en = e.target.checked; viewer.shadows = en; viewer.scene.shadowMap.enabled = en; viewer.scene.requestRender();
      });

      // Time slider
      const timeSlider = document.getElementById("timeSlider");
      const timeLabel  = document.getElementById("timeLabel");
      function setClockHour(h){
        timeSlider.value = h; timeLabel.textContent = `${h}:00`;
        viewer.clock.currentTime = Cesium.JulianDate.fromDate(new Date(2025,5,21,h));
        updateStyles();
      }
      timeSlider.addEventListener("input", ()=>setClockHour(parseInt(timeSlider.value)));
      document.querySelectorAll(".snapBtn").forEach(btn=>{
        btn.addEventListener("click", ()=>{
          const mins = parseInt(btn.dataset.mins,10);
          const now = new Date(); const snap = new Date(now.getTime() + mins*60*1000);
          setClockHour(snap.getHours());
        });
      });

      // Heatpoints (static files)
      async function loadHeatmap(tod){
        for (const e of heatmapEntities) viewer.entities.remove(e);
        heatmapEntities = [];
        try{
          const r = await resilientFetch(`${tod}_heatpoints.json`); const data = await r.json();
          for (const [lat,lon,speed] of data){
            const normalized = clamp01(speed/60);
            const hue = (1 - normalized) * 240; // 240 blue -> 0 red
            const color = Cesium.Color.fromHsl(hue/360,1,0.5).withAlpha(0.8);
            const entity = viewer.entities.add({
              position: Cesium.Cartesian3.fromDegrees(lon, lat, 2),
              point: { pixelSize:10, color, outlineColor:Cesium.Color.WHITE, outlineWidth:1, heightReference:Cesium.HeightReference.RELATIVE_TO_GROUND }
            });
            heatmapEntities.push(entity);
          }
        }catch(e){ console.warn("Heatpoints load failed", e); }
        viewer.scene.requestRender();
      }
      loadHeatmap("morning");
      document.getElementById("heatmapTimeSelector").addEventListener("change", e=>loadHeatmap(e.target.value));

      // TomTom live traffic (kept) + status
      const liveTrafficToggle = document.getElementById("liveTrafficToggle");
      const trafficRefresh = document.getElementById("trafficRefresh");
      const trafficStatus = document.createElement("div");
      Object.assign(trafficStatus.style,{position:"absolute",right:"1rem",top:"1rem",zIndex:20,background:"rgba(255,255,255,.9)",padding:"6px 10px",borderRadius:"10px",fontFamily:"system-ui,sans-serif",fontSize:"12px",boxShadow:"0 2px 6px rgba(0,0,0,.15)"});
      trafficStatus.textContent = "Traffic: starting…"; document.body.appendChild(trafficStatus);
      const setTrafficStatus = msg => trafficStatus.textContent = `Traffic: ${msg}`;

      function addOrUpdateTrafficLayer(){
        const ts = Date.now();
        const provider = new Cesium.UrlTemplateImageryProvider({
          url:`https://api.tomtom.com/traffic/map/4/tile/flow/relative/{z}/{x}/{y}.png?key=${TOMTOM_KEY}&ts=${ts}`,
          maximumLevel:20,
          tilingScheme:new Cesium.WebMercatorTilingScheme(),
          credit:"TomTom Traffic"
        });
        provider.errorEvent.addEventListener(()=> setTrafficStatus("error (check key)"));
        const layer = viewer.imageryLayers.addImageryProvider(provider);
        layer.alpha = 0.7;
        if (trafficLayer) viewer.imageryLayers.remove(trafficLayer, false);
        trafficLayer = layer;
        (function waitReady(){
          if (provider.ready){ setTrafficStatus(`updated @ ${new Date().toLocaleTimeString()}`); viewer.scene.requestRender(); }
          else requestAnimationFrame(waitReady);
        })();
      }
      function beginTrafficUpdates(){
        try{ addOrUpdateTrafficLayer(); }catch{ setTrafficStatus("init failed"); }
        const ms = Math.max(15000, parseInt(trafficRefresh.value,10)*1000);
        if (trafficTimer) clearInterval(trafficTimer);
        trafficTimer = setInterval(()=>{ try{ addOrUpdateTrafficLayer(); }catch{} }, ms);
      }
      function stopTrafficUpdates(){
        if (trafficTimer) { clearInterval(trafficTimer); trafficTimer=null; }
        if (trafficLayer){ viewer.imageryLayers.remove(trafficLayer, false); trafficLayer=null; }
        setTrafficStatus("off"); viewer.scene.requestRender();
      }
      liveTrafficToggle.addEventListener("change", e=> e.target.checked ? beginTrafficUpdates() : stopTrafficUpdates());
      trafficRefresh.addEventListener("change", ()=> { if (liveTrafficToggle.checked) beginTrafficUpdates(); });
      beginTrafficUpdates();
    }

    // =========  START  =========
    startCesiumApp();
  </script>
</body>
</html>
