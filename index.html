<!-- ... HEAD unchanged ... -->
<body>
  <div id="cesiumContainer"></div>

  <!-- UI Panel -->
  <div class="absolute top-4 left-4 bg-white/90 p-4 rounded-xl shadow-lg w-72 space-y-4 z-10 font-sans">
    <!-- Existing Controls -->
    <div>
      <label class="block font-medium">Select Building</label>
      <select id="buildingSelector" class="w-full border rounded px-2 py-1">
        <option value="">-- All Buildings --</option>
      </select>
    </div>
    <div>
      <label class="block font-medium">Color</label>
      <input type="color" id="colorPicker" class="w-full" value="#cccccc" />
    </div>
    <div>
      <label class="block font-medium">Time of Day</label>
      <input type="range" id="timeSlider" min="0" max="24" step="1" value="12" class="w-full" />
      <div id="timeLabel" class="text-sm text-gray-600">12:00</div>
    </div>
    <div>
      <label class="inline-flex items-center">
        <input type="checkbox" id="heatToggle" checked class="mr-2" />
        Show Heat Colors
      </label>
    </div>
    <div>
      <label class="inline-flex items-center">
        <input type="checkbox" id="shadowToggle" checked class="mr-2" />
        Enable Shadows
      </label>
    </div>

    <!-- ✅ New Dropdown for Heatmap -->
    <div>
      <label class="block font-medium">Traffic Heatmap Time</label>
      <select id="heatmapTimeSelector" class="w-full border rounded px-2 py-1">
        <option value="morning">Morning</option>
        <option value="lunch">Lunch</option>
        <option value="evening">Evening</option>
        <option value="night">Night</option>
      </select>
    </div>
  </div>

  <!-- Legend & Tooltip remain unchanged -->
  <div id="legend">
    <div class="font-semibold">UHI Temperature (°C)</div>
    <div id="legendGradient"></div>
    <div class="flex justify-between"><span>25</span><span>40</span></div>
  </div>
  <div id="tooltip"></div>

  <script>
    const weatherApiKey = "2d6c23f739fdc7ba90b8754fd02dae9c";
    let buildings = [];
    let heatmapEntities = [];

    async function fetchUHI() {
      const urbanURL = `https://api.openweathermap.org/data/2.5/weather?lat=45.165&lon=9.703&units=metric&appid=${weatherApiKey}`;
      const ruralURL = `https://api.openweathermap.org/data/2.5/weather?lat=45.165&lon=9.603&units=metric&appid=${weatherApiKey}`;
      const [urbanRes, ruralRes] = await Promise.all([fetch(urbanURL), fetch(ruralURL)]);
      const urbanData = await urbanRes.json();
      const ruralData = await ruralRes.json();

      const urbanTemp = urbanData.main.temp;
      const ruralTemp = ruralData.main.temp;

      buildings.forEach(building => {
        const height = parseFloat(building.properties?.height?.getValue?.() ?? building.properties?.height) || 10;
        const simTemp = urbanTemp + height * 0.03;
        building.properties.addProperty("sim_uhi", simTemp);
      });
    }

    async function startCesiumApp() {
      Cesium.Ion.defaultAccessToken = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiIxMTUyZDQ1NS1mMzZhLTQzYTEtOWE5NC1iZjM4OWJlMWVhZTMiLCJpZCI6MzA0ODA3LCJpYXQiOjE3NDc4MjQzNjV9.GicPO1Vdm6jWAy1XAnct4jCx4muG1tuFcF-Dlvlg1Rw";

      const viewer = new Cesium.Viewer("cesiumContainer", {
        baseLayerPicker: true,
        timeline: false,
        animation: false,
        shadows: true
      });

      viewer.terrainProvider = await Cesium.createWorldTerrainAsync();
      viewer.scene.globe.enableLighting = true;
      viewer.scene.shadowMap.enabled = true;
      viewer.scene.shadowMap.softShadows = true;
      viewer.scene.shadowMap.size = 2048;
      viewer.scene.shadowMap.darkness = 0.3;

      const buildingSelector = document.getElementById("buildingSelector");

      const dataSource = await Cesium.GeoJsonDataSource.load("codogno_buildings_with_heights.geojson", { clampToGround: false });
      viewer.dataSources.add(dataSource);
      buildings = dataSource.entities.values;

      buildings.forEach((building, i) => {
        const name = `Building ${i + 1}`;
        building.name = name;

        const height = parseFloat(building.properties?.height?.getValue?.() ?? building.properties?.height) || 10;

        if (building.polygon) {
          building.polygon.extrudedHeight = height;
          building.polygon.height = 0;
          building.polygon.heightReference = Cesium.HeightReference.RELATIVE_TO_GROUND;
          building.polygon.extrudedHeightReference = Cesium.HeightReference.RELATIVE_TO_GROUND;
          building.polygon.material = Cesium.Color.LIGHTGRAY.withAlpha(1.0);
          building.polygon.outline = false;
        }

        const option = document.createElement("option");
        option.value = name;
        option.textContent = name;
        buildingSelector.appendChild(option);
      });

      await fetchUHI();
      updateStyles();

      viewer.camera.flyTo({
        destination: Cesium.Cartesian3.fromDegrees(9.703, 45.165, 500),
        orientation: {
          heading: Cesium.Math.toRadians(0),
          pitch: Cesium.Math.toRadians(-45),
          roll: 0.0
        }
      });

      function updateStyles() {
        const selected = buildingSelector.value;
        const colorHex = document.getElementById("colorPicker").value;
        const alpha = 1.0;
        const showHeat = document.getElementById("heatToggle").checked;

        for (const building of buildings) {
          if (!building.polygon) continue;

          let color = Cesium.Color.fromCssColorString(colorHex).withAlpha(alpha);

          if (showHeat) {
            const t = parseFloat(building.properties?.sim_uhi?.getValue?.() ?? building.properties?.sim_uhi);
            if (!isNaN(t)) {
              const normalized = Math.min(Math.max((t - 25) / 15, 0), 1);
              const hue = 60 + normalized * (330 - 60);
              color = Cesium.Color.fromHsl(hue / 360, 1.0, 0.6, alpha);
            }
          }

          if (!selected || building.name === selected) {
            building.polygon.material = color;
          }
        }
      }

      const tooltip = document.getElementById("tooltip");

      viewer.screenSpaceEventHandler.setInputAction(function (movement) {
        const picked = viewer.scene.pick(movement.endPosition);
        if (picked && picked.id && picked.id.properties) {
          const props = picked.id.properties;
          const t = props?.sim_uhi?.getValue?.() ?? props?.sim_uhi ?? "N/A";
          const h = props?.height?.getValue?.() ?? props?.height ?? "N/A";
          const name = picked.id.name ?? "Unknown";

          tooltip.innerHTML = `<strong>${name}</strong><br>Height: ${h} m<br>Temp: ${parseFloat(t).toFixed(1)} °C`;
          tooltip.style.left = (movement.endPosition.x + 15) + "px";
          tooltip.style.top = (movement.endPosition.y + 15) + "px";
          tooltip.style.display = "block";
        } else {
          tooltip.style.display = "none";
        }
      }, Cesium.ScreenSpaceEventType.MOUSE_MOVE);

      document.getElementById("colorPicker").addEventListener("input", updateStyles);
      document.getElementById("buildingSelector").addEventListener("change", updateStyles);
      document.getElementById("heatToggle").addEventListener("change", updateStyles);
      document.getElementById("shadowToggle").addEventListener("change", (e) => {
        const enabled = e.target.checked;
        viewer.shadows = enabled;
        viewer.scene.shadowMap.enabled = enabled;
      });

      const timeSlider = document.getElementById("timeSlider");
      const timeLabel = document.getElementById("timeLabel");
      timeSlider.addEventListener("input", () => {
        const hour = parseInt(timeSlider.value);
        timeLabel.textContent = `${hour}:00`;
        viewer.clock.currentTime = Cesium.JulianDate.fromDate(new Date(2025, 5, 21, hour));
        updateStyles();
      });

      // ✅ Load Heatmap Points
      async function loadHeatmap(timeOfDay) {
        for (const entity of heatmapEntities) {
          viewer.entities.remove(entity);
        }
        heatmapEntities = [];

        const file = `heatmaps/${timeOfDay}_heatpoints.json`;
        const response = await fetch(file);
        const data = await response.json();

        for (const [lat, lon, speed] of data) {
          const normalized = Math.min(speed / 60, 1);
          const hue = (1 - normalized) * 240; // blue (slow) → red (fast)
          const color = Cesium.Color.fromHsl(hue / 360, 1.0, 0.5).withAlpha(0.8);

          const entity = viewer.entities.add({
            position: Cesium.Cartesian3.fromDegrees(lon, lat),
            point: {
              pixelSize: 10,
              color: color,
              outlineColor: Cesium.Color.WHITE,
              outlineWidth: 1
            }
          });
          heatmapEntities.push(entity);
        }
      }

      // Load default
      loadHeatmap("morning");
      document.getElementById("heatmapTimeSelector").addEventListener("change", (e) => {
        loadHeatmap(e.target.value);
      });
    }

    startCesiumApp();
  </script>
</body>
</html>
